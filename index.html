/* ABACUS LOGIC — absolute positioning */
(function(){
  const board=document.getElementById('abacus-board');
  if(!board)return;
  const valEl=document.getElementById('abacus-val');
  const RODS=7, mults=[1000000,100000,10000,1000,100,10,1];
  const state=Array.from({length:RODS},()=>({upper:false,lower:0}));
  const rodEls=board.querySelectorAll('.abacus-rod');

  // Layout constants (px)
  const BH=20, GAP=2, STEP=BH+GAP;  // bead height, gap, step
  const BAR_Y=48;                      // bar top position
  const UP_REST=4;                     // upper bead resting (top of rod)
  const UP_ACTIVE=BAR_Y-BH-2;         // upper bead active (just above bar)
  const LO_START=BAR_Y+6;             // lower zone starts just below bar
  const ROD_H=154;

  // Lower bead positions:
  //   active (up, touching bar): top = LO_START + i*STEP
  //   inactive (down, at bottom): top = ROD_H - (4-i)*STEP
  function loUp(i){return LO_START+i*STEP}
  function loDown(i){return ROD_H-(4-i)*STEP}

  function renderRod(ri){
    const rod=rodEls[ri]; if(!rod)return;
    const s=state[ri];
    const beads=rod.querySelectorAll('.ab');
    // beads[0] = upper, beads[1..4] = lower 0..3
    beads[0].style.top=(s.upper?UP_ACTIVE:UP_REST)+'px';
    beads[0].classList.toggle('on',s.upper);
    for(let i=0;i<4;i++){
      const active=i<s.lower;
      beads[i+1].style.top=(active?loUp(i):loDown(i))+'px';
      beads[i+1].classList.toggle('on',active);
    }
  }

  function calcTotal(){
    let t=0;
    state.forEach((s,i)=>{t+=(s.upper?5:0)*mults[i]+s.lower*mults[i]});
    return t;
  }

  board.addEventListener('click',function(e){
    const bead=e.target.closest('.ab');
    if(!bead)return;
    const ri=parseInt(bead.dataset.r);
    if(bead.dataset.t==='u'){
      state[ri].upper=!state[ri].upper;
    } else {
      const bi=parseInt(bead.dataset.b); // 0..3 (0=top near bar, 3=bottom)
      const cur=state[ri].lower;
      if(bi<cur){
        // clicking an active bead -> pull it and beads below it back down
        state[ri].lower=bi;
      } else {
        // clicking an inactive bead -> push it and all above up to bar
        state[ri].lower=bi+1;
      }
    }
    renderRod(ri);
    valEl.textContent=calcTotal().toLocaleString('pt-BR');
  });

  for(let i=0;i<RODS;i++)renderRod(i);
})();

/* BOOLE CIRCUIT LOGIC — security system */
(function(){
  const inputsEl=document.getElementById('boole-inputs');
  if(!inputsEl)return;
  const state={p:0,f:0,m:0,l:0};
  const ids=['p','f','m','l'];

  function hi(id,on){const el=document.getElementById(id);if(el)el.classList.toggle('hi',on)}

  function update(){
    const {p,f,m,l}=state;
    // Toggle visuals
    ids.forEach(id=>{
      const sw=inputsEl.querySelector(`[data-id="${id}"]`);
      sw.querySelector('.boole-toggle').classList.toggle('on',!!state[id]);
      document.getElementById('bsl-'+id).classList.toggle('on',!!state[id]);
    });

    // Compute
    const and1=p&f;
    const or1=and1|m;
    const not1=l?0:1;
    const out=or1&not1;

    // Input wires
    hi('bw-p',!!p); hi('bw-f',!!f); hi('bw-m',!!m); hi('bw-l',!!l);
    hi('bl-p',!!p); hi('bl-f',!!f); hi('bl-m',!!m); hi('bl-l',!!l);

    // Gate 1: AND
    hi('bg-and1',!!and1); hi('bw-and-or',!!and1); hi('bv-and1',!!and1);
    document.getElementById('bv-and1').textContent=and1;

    // Gate 2: OR
    hi('bg-or',!!or1); hi('bw-or-and2',!!or1); hi('bv-or',!!or1);
    document.getElementById('bv-or').textContent=or1;

    // Gate 3: NOT
    hi('bg-not',!!not1); hi('bg-not-b',!!not1); hi('bw-not-and2',!!not1); hi('bv-not',!!not1);
    document.getElementById('bv-not').textContent=not1;

    // Gate 4: AND2 → output
    hi('bg-and2',!!out); hi('bw-out',!!out); hi('bv-out',!!out);
    document.getElementById('bv-out').textContent=out;
    document.getElementById('bv-out-icon').textContent=out?'🔓':'🔒';
    hi('bv-out-icon',!!out);

    // Expression
    const exprEl=document.getElementById('boole-expr');
    const cls=v=>v?'bx-hi':'bx-lo';
    exprEl.innerHTML=`PORTA = (P∧F) ∨ M) ∧ (¬L) = (<span class="${cls(and1)}">${and1}</span> ∨ ${m}) ∧ <span class="${cls(not1)}">${not1}</span> = <span class="${cls(or1)}">${or1}</span> ∧ <span class="${cls(not1)}">${not1}</span> = <span class="${cls(out)}">${out}</span> → <strong>${out?'🔓 ABERTA':'🔒 TRANCADA'}</strong>`;
  }

  inputsEl.addEventListener('click',function(e){
    const sw=e.target.closest('.boole-sw');
    if(!sw)return;
    const id=sw.dataset.id;
    state[id]=state[id]?0:1;
    update();
  });

  update();
})();

/* HOLLERITH LOGIC */
(function(){
  const goBtn=document.getElementById('holl-go');
  if(!goBtn)return;
  const card=document.getElementById('holl-card');
  const needles=document.getElementById('holl-needles');
  const ctrsEl=document.getElementById('holl-ctrs');
  const statusEl=document.getElementById('holl-status');
  const pileEl=document.getElementById('holl-pile');
  const resetBtn=document.getElementById('holl-reset');
  const cats=['Homem','Mulher','Casado','Solteiro','<30a','30-60','60+','Urban','Rural'];
  const NC=cats.length;
  const counters=new Array(NC).fill(0);
  let total=0,busy=false;

  function genPerson(){
    const p=new Array(NC).fill(false);
    // sex: one of first two
    const sex=Math.random()<.5?0:1; p[sex]=true;
    // marital: one of next two
    const mar=Math.random()<.55?2:3; p[mar]=true;
    // age: one of next three
    const r=Math.random(); p[r<.4?4:r<.8?5:6]=true;
    // location
    p[Math.random()<.65?7:8]=true;
    return p;
  }

  function runCard(){
    if(busy)return;
    busy=true;
    goBtn.disabled=true;
    const person=genPerson();

    // 1. Reset card and show entering
    const holes=card.querySelectorAll('.holl-hole');
    const ndls=needles.querySelectorAll('.holl-needle');
    holes.forEach((h,i)=>{
      h.classList.toggle('punched',person[i]);
      h.classList.remove('spark');
    });
    ndls.forEach(n=>{n.classList.remove('fire','miss')});

    card.className='holl-card enter';
    statusEl.innerHTML='';

    // 2. Card slides in
    setTimeout(()=>{
      card.className='holl-card reading';
    },100);

    // 3. Needles probe (slower — let them see the needles descend)
    setTimeout(()=>{
      ndls.forEach((n,i)=>{
        n.classList.add(person[i]?'fire':'miss');
      });
    },800);

    // 3b. Spark on punched holes (after needles reach)
    setTimeout(()=>{
      holes.forEach((h,i)=>{
        if(person[i]) h.classList.add('spark');
      });
    },1300);

    // 4. Increment counters
    setTimeout(()=>{
      const matched=[];
      person.forEach((v,i)=>{
        if(!v)return;
        counters[i]++;
        matched.push(cats[i]);
        const el=ctrsEl.querySelector(`.holl-ctr-val[data-i="${i}"]`);
        el.textContent=counters[i];
        el.classList.add('bump');
        setTimeout(()=>el.classList.remove('bump'),400);
      });
      total++;
      pileEl.textContent='Cartões: '+total;
      statusEl.innerHTML=`Cartão #${total}: <strong>${matched.join(' · ')}</strong>`;
    },1800);

    // 5. Card exits
    setTimeout(()=>{
      ndls.forEach(n=>{n.classList.remove('fire','miss')});
      holes.forEach(h=>h.classList.remove('spark'));
      card.className='holl-card exit';
    },2600);

    // 6. Ready for next
    setTimeout(()=>{
      busy=false;
      goBtn.disabled=false;
    },3100);
  }

  goBtn.addEventListener('click',runCard);

  resetBtn.addEventListener('click',function(){
    counters.fill(0);total=0;
    ctrsEl.querySelectorAll('.holl-ctr-val').forEach(el=>{el.textContent='0'});
    pileEl.textContent='Cartões: 0';
    statusEl.innerHTML='';
    card.className='holl-card enter';
  });
})();

/* PASCALINE LOGIC */
(function(){
  const wheels=document.getElementById('pascal-wheels');
  if(!wheels)return;
  const dispEl=document.getElementById('pascal-display');
  const resetBtn=document.getElementById('pascal-reset');
  const N=6;
  const state=[0,0,0,0,0,0];
  const drums=wheels.querySelectorAll('.pascal-drum');
  const DH=52;

  function setWheel(w,val,animate){
    state[w]=val;
    const inner=drums[w].querySelector('.pascal-drum-inner');
    inner.style.transition=animate?'transform .35s cubic-bezier(.4,0,.2,1)':'none';
    inner.style.transform=`translateY(-${val*DH}px)`;
  }

  function updateDisplay(){
    dispEl.textContent=state.join('');
  }

  function incrementWheel(w,delta,delay){
    setTimeout(()=>{
      drums[w].classList.remove('carry');
      let next=state[w]+delta, carry=0;
      if(next>9){carry=1;next=0}
      else if(next<0){carry=-1;next=9}
      setWheel(w,next,true);
      if(carry!==0){
        drums[w].classList.add('carry');
        setTimeout(()=>drums[w].classList.remove('carry'),400);
        if(w>0)incrementWheel(w-1,carry,200);
      }
      updateDisplay();
    },delay);
  }

  wheels.addEventListener('click',function(e){
    const btn=e.target.closest('.pascal-btn');
    if(!btn)return;
    incrementWheel(parseInt(btn.dataset.w),parseInt(btn.dataset.d),0);
  });

  resetBtn.addEventListener('click',function(){
    for(let i=0;i<N;i++)setWheel(i,0,true);
    updateDisplay();
  });

  for(let i=0;i<N;i++)setWheel(i,0,false);
  updateDisplay();
})();

/* NAPIER BONES LOGIC */
(function(){
  const grid=document.getElementById('napier-grid');
  if(!grid)return;
  const eqEl=document.getElementById('napier-eq');
  const diagsEl=document.getElementById('napier-diags');
  let bones=[4,2,7], activeMult=0;
  const dgLabels=['var(--cyan)','var(--green)','var(--orange)','var(--purple)'];

  function buildGrid(){
    const N=bones.length;
    grid.style.gridTemplateColumns='32px repeat('+N+',52px)';
    let html='<div class="np-hdr np-corner">×</div>';
    bones.forEach((b,i)=>{html+=`<div class="np-hdr" data-bi="${i}">${b}</div>`});
    for(let m=1;m<=9;m++){
      html+=`<div class="np-mult" data-m="${m}">${m}</div>`;
      bones.forEach(b=>{
        const p=b*m;
        html+=`<div class="np-cell" data-m="${m}"><span class="np-t">${Math.floor(p/10)}</span><span class="np-o">${p%10}</span></div>`;
      });
    }
    grid.innerHTML=html;
    if(activeMult)selectRow(activeMult);
  }

  function selectRow(m){
    activeMult=m;
    grid.querySelectorAll('.np-mult.active').forEach(el=>el.classList.remove('active'));
    grid.querySelectorAll('.np-cell.active').forEach(el=>el.classList.remove('active'));
    grid.querySelector(`.np-mult[data-m="${m}"]`).classList.add('active');
    const cells=[...grid.querySelectorAll(`.np-cell[data-m="${m}"]`)];
    cells.forEach(c=>c.classList.add('active'));

    const N=bones.length;
    const prods=bones.map(b=>({t:Math.floor(b*m/10),o:(b*m)%10}));

    // Build diagonal groups: N+1 groups for N bones
    // group 0 (rightmost) = last bone ones
    // group k (middle) = bone[N-k].tens + bone[N-k-1].ones
    // group N (leftmost) = first bone tens
    const rawDiags=[];
    rawDiags.push([prods[N-1].o]);
    for(let k=1;k<N;k++) rawDiags.push([prods[N-k].t, prods[N-k-1].o]);
    rawDiags.push([prods[0].t]);

    // Color digits: bone i → tens in dg (N-i), ones in dg (N-1-i)
    cells.forEach((c,ci)=>{
      c.querySelector('.np-t').className='np-t dg-'+((N-ci)%(N+1));
      c.querySelector('.np-o').className='np-o dg-'+(N-1-ci);
    });

    // Result with carries
    const sums=rawDiags.map(g=>g.reduce((a,b)=>a+b,0));
    const resDigits=[];
    let carry=0;
    for(let i=0;i<sums.length;i++){const v=sums[i]+carry;resDigits.push(v%10);carry=Math.floor(v/10)}
    if(carry>0)resDigits.push(carry);
    const result=resDigits.reverse().join('');
    const numStr=bones.join('');

    eqEl.innerHTML=`${numStr} × ${m} = <strong>${result}</strong>`;
    diagsEl.innerHTML=rawDiags.map((g,i)=>{
      const c=dgLabels[i%dgLabels.length];
      const s=g.reduce((a,b)=>a+b,0);
      return `<span class="napier-dg show" style="color:${c};border-color:${c}">${g.join('+')}${g.length>1?'='+s:''}</span>`;
    }).reverse().join('<span style="color:var(--mut);font-size:10px">·</span>');
  }

  grid.addEventListener('click',function(e){
    const mult=e.target.closest('.np-mult');
    if(mult){selectRow(parseInt(mult.dataset.m));return}
    const hdr=e.target.closest('.np-hdr[data-bi]');
    if(hdr){
      const bi=parseInt(hdr.dataset.bi);
      bones[bi]=(bones[bi]+1)%10;
      buildGrid();
    }
  });

  buildGrid();
  eqEl.textContent='Clique nos dígitos do topo para alterar · Multiplicador à esquerda';
})();

dotsEl.innerHTML=SECS.map((s,i)=>`<div class="dot" data-s="${i}" title="${s.name}"></div>`).join('');

const timers={};
function stopTimers(){Object.values(timers).forEach(clearInterval);for(const k in timers)delete timers[k]}
function startCtr(id,subid,vals,subs,ms){
  const el=document.getElementById(id),sel=document.getElementById(subid);
  if(!el)return;let step=0;
  const t=setInterval(()=>{el.textContent=vals[step];if(sel)sel.textContent=subs[step];step++;if(step>=vals.length)clearInterval(t)},ms);
  timers[id]=t;
}
function triggerAnims(i){
  stopTimers();
  if(D[i].ctr){
    startCtr(`ctr-${i}`,`ctr-sub-${i}`,
      ['2.300','29.000','275.000','3.100.000','7.500.000.000','100.000.000.000'],
      ['Intel 4004 · 1971','Intel 8080 · 1974','Intel 286 · 1982','Intel 486 · 1989','Apple M1 · 2020','Apple M3 Ultra · 2024'],800);
  }
  if(D[i].sc){
    startCtr(`ctr-${i}`,`ctr-sub-${i}`,
      ['166 MegaFLOPS','80 GigaFLOPS','35,8 TeraFLOPS','148,6 PetaFLOPS','1,1 ExaFLOPS'],
      ['Cray-1 · 1976','Cray T3E · 1997','IBM Roadrunner · 2008','IBM Summit · 2018','Frontier · 2022'],1000);
  }
}

function goTo(n){
  if(n<0||n>=D.length)return;
  slides[cur].classList.remove('on');
  cur=n;
  slides[cur].classList.add('on');
  const s=sOf(cur);
  prog.style.width=((cur/(D.length-1))*100).toFixed(1)+'%';
  prog.style.background=s.color;
  secbar.style.background=s.color;
  document.documentElement.style.setProperty('--acc',s.color);
  sctrEl.textContent=String(cur+1).padStart(2,'0')+' / '+D.length;
  btnP.disabled=cur===0;btnN.disabled=cur===D.length-1;
  const si=SECS.findIndex(sec=>cur>=sec.first&&cur<=sec.last);
  dotEls.forEach((d,i)=>d.classList.toggle('on',i===si));
  triggerAnims(cur);
}
btnP.addEventListener('click',()=>goTo(cur-1));
btnN.addEventListener('click',()=>goTo(cur+1));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')goTo(cur+1);
  else if(e.key==='ArrowLeft')goTo(cur-1);
  else if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}
});
let tx0=0;
document.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx0;if(Math.abs(dx)>50)goTo(dx<0?cur+1:cur-1)},{passive:true});
goTo(0);
